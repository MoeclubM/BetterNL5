name: Build Installer

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    env:
      PROJECT_PATH: BetterNL5/BetterNL5.csproj
      PUBLISH_DIR: .artifacts/gui-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compute installer version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart('v')
          }
          else {
            $version = "0.0.${{ github.run_number }}.${{ github.run_attempt }}"
          }
          "app_version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Publish unpackaged GUI
        shell: pwsh
        run: |
          $publishDir = Join-Path "${{ github.workspace }}" "${{ env.PUBLISH_DIR }}"
          $objDir = Join-Path "${{ github.workspace }}" ".artifacts\publish-obj\"
          dotnet publish "${{ env.PROJECT_PATH }}" -c Release -r win-x64 --self-contained true -p:Platform=x64 -p:WindowsPackageType=None -p:WindowsAppSDKSelfContained=true -p:BaseIntermediateOutputPath="$objDir" -o "$publishDir"

      - name: Compile installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .artifacts\installer | Out-Null
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "Installer\BetterNL5.iss" "/DAppVersion=${{ steps.version.outputs.app_version }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterNL5-Installer
          path: .artifacts/installer/*.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: .artifacts/installer/*.exe
